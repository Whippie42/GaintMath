<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Games | Unblocked</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #f4f4f5;
        }

        .game-card:hover img {
            transform: scale(1.1);
        }

        iframe {
            background-color: #000;
            background-image: radial-gradient(circle, #10b981 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
    </style>
</head>
<body class="selection:bg-emerald-500/30">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 border-b border-white/5 bg-[#0a0a0a]/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-2 cursor-pointer group" onclick="closePlayer()">
                    <div class="p-2 bg-emerald-500 rounded-lg group-hover:rotate-12 transition-transform">
                        <i data-lucide="gamepad-2" class="w-6 h-6 text-black"></i>
                    </div>
                    <span class="text-xl font-bold tracking-tighter uppercase italic">Nexus Games</span>
                </div>

                <div class="flex-1 max-w-md mx-8 hidden sm:block">
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500"></i>
                        <input
                            type="text"
                            id="searchInput"
                            placeholder="Search games..."
                            oninput="filterGames()"
                            class="w-full bg-white/5 border border-white/10 rounded-full py-2 pl-10 pr-4 focus:outline-none focus:border-emerald-500/50 focus:ring-1 focus:ring-emerald-500/50 transition-all text-sm"
                        >
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <span id="gameCount" class="text-xs font-mono text-zinc-500 hidden md:block uppercase tracking-widest">
                        0 Games Available
                    </span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Game Player (Hidden by default) -->
        <div id="gamePlayer" class="hidden space-y-6 mb-12">
            <div class="flex items-center justify-between">
                <button onclick="closePlayer()" class="flex items-center gap-2 text-zinc-400 hover:text-white transition-colors group">
                    <i data-lucide="chevron-left" class="w-5 h-5 group-hover:-translate-x-1 transition-transform"></i>
                    <span>Back to Library</span>
                </button>
                <div class="flex items-center gap-2">
                    <button onclick="toggleFullscreen()" class="p-2 hover:bg-white/5 rounded-lg transition-colors">
                        <i data-lucide="maximize-2" class="w-5 h-5"></i>
                    </button>
                    <a id="externalLink" href="#" target="_blank" class="p-2 hover:bg-white/5 rounded-lg transition-colors">
                        <i data-lucide="external-link" class="w-5 h-5"></i>
                    </a>
                    <button onclick="closePlayer()" class="p-2 hover:bg-white/5 rounded-lg transition-colors text-red-400">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <div id="iframeContainer" class="relative bg-black rounded-2xl overflow-hidden border border-white/10 shadow-2xl aspect-video w-full">
                <iframe id="gameIframe" src="" class="w-full h-full border-none" allow="fullscreen; autoplay; encrypted-media"></iframe>
            </div>

            <div class="flex flex-col md:flex-row md:items-end justify-between gap-4">
                <div>
                    <h1 id="activeTitle" class="text-3xl font-bold tracking-tight">Game Title</h1>
                    <p id="activeDesc" class="text-zinc-400 mt-1">Game description goes here.</p>
                </div>
                <div class="flex gap-2">
                    <span class="px-3 py-1 bg-emerald-500/10 text-emerald-400 text-xs font-semibold rounded-full border border-emerald-500/20">UNBLOCKED</span>
                    <span class="px-3 py-1 bg-white/5 text-zinc-400 text-xs font-semibold rounded-full border border-white/10">WEBGL</span>
                </div>
            </div>
        </div>

        <!-- Library View -->
        <div id="libraryView" class="space-y-8">
            <!-- Hero -->
            <div class="relative rounded-3xl overflow-hidden bg-gradient-to-br from-emerald-600/20 to-zinc-900 border border-white/5 p-8 md:p-12">
                <div class="relative z-10 max-w-2xl">
                    <h2 class="text-4xl md:text-6xl font-black tracking-tighter uppercase italic leading-none mb-4">
                        Play Without <br>
                        <span class="text-emerald-500">Limits.</span>
                    </h2>
                    <p class="text-zinc-400 text-lg mb-8">
                        The ultimate collection of unblocked web games. High performance, zero ads, pure gameplay.
                    </p>
                    <button onclick="playFeatured()" class="px-8 py-3 bg-emerald-500 text-black font-bold rounded-full hover:bg-emerald-400 hover:scale-105 transition-all active:scale-95">
                        Play Featured
                    </button>
                </div>
                <div class="absolute top-0 right-0 w-1/2 h-full opacity-20 pointer-events-none">
                    <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-emerald-500/40 via-transparent to-transparent blur-3xl"></div>
                </div>
            </div>

            <!-- Grid -->
            <div id="gamesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- Games will be injected here -->
            </div>
        </div>
    </main>

    <footer class="border-t border-white/5 py-12 mt-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center md:text-left">
            <div class="flex flex-col md:flex-row justify-between items-center gap-8">
                <div class="flex items-center gap-2">
                    <i data-lucide="gamepad-2" class="w-5 h-5 text-emerald-500"></i>
                    <span class="font-bold tracking-tighter uppercase italic">Nexus Games</span>
                </div>
                <div class="flex gap-8 text-sm text-zinc-500">
                    <a href="#" class="hover:text-white transition-colors">Terms</a>
                    <a href="#" class="hover:text-white transition-colors">Privacy</a>
                    <a href="#" class="hover:text-white transition-colors">DMCA</a>
                </div>
                <p class="text-xs text-zinc-600 font-mono">&copy; 2024 NEXUS_GAMES_V1.0.0</p>
            </div>
        </div>
    </footer>

    <script>
        let allGames = [];

        async function init() {
            try {
                const response = await fetch('./src/data/games.json');
                allGames = await response.json();
                renderGames(allGames);
                document.getElementById('gameCount').textContent = `${allGames.length} Games Available`;
                lucide.createIcons();
            } catch (err) {
                console.error("Failed to load games:", err);
            }
        }

        function renderGames(games) {
            const grid = document.getElementById('gamesGrid');
            grid.innerHTML = games.map(game => `
                <div class="group cursor-pointer" onclick="playGame('${game.id}')">
                    <div class="relative aspect-[4/3] rounded-2xl overflow-hidden border border-white/10 bg-white/5 transition-all group-hover:border-emerald-500/50">
                        <img src="${game.thumbnail}" alt="${game.title}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" referrerpolicy="no-referrer">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-4">
                            <button class="w-full py-2 bg-emerald-500 text-black font-bold rounded-lg text-sm">PLAY NOW</button>
                        </div>
                    </div>
                    <div class="mt-3 px-1">
                        <h3 class="font-bold text-lg group-hover:text-emerald-400 transition-colors">${game.title}</h3>
                        <p class="text-sm text-zinc-500 line-clamp-1">${game.description}</p>
                    </div>
                </div>
            `).join('');
        }

        function filterGames() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allGames.filter(g => 
                g.title.toLowerCase().includes(query) || 
                g.description.toLowerCase().includes(query)
            );
            renderGames(filtered);
        }

        function playGame(id) {
            const game = allGames.find(g => g.id === id);
            if (!game) return;

            document.getElementById('libraryView').classList.add('hidden');
            document.getElementById('gamePlayer').classList.remove('hidden');
            
            document.getElementById('gameIframe').src = game.url;
            document.getElementById('activeTitle').textContent = game.title;
            document.getElementById('activeDesc').textContent = game.description;
            document.getElementById('externalLink').href = game.url;
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function closePlayer() {
            document.getElementById('gameIframe').src = "";
            document.getElementById('gamePlayer').classList.add('hidden');
            document.getElementById('libraryView').classList.remove('hidden');
        }

        function playFeatured() {
            if (allGames.length > 0) playGame(allGames[0].id);
        }

        function toggleFullscreen() {
            const elem = document.getElementById('iframeContainer');
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }
        }

        init();
    </script>
</body>
</html>
